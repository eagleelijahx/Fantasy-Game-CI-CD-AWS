name: Fast Linux-to-Windows Cross-Compile

on:
  push:
    branches: [ "main" ]

jobs:
  build-windows-on-linux:
    runs-on: ubuntu-latest  # Light, fast Linux runner
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Toolchain and Allegro 5 Cross-Compilers
      run: |
        sudo apt-get update
        # Installs the MinGW (GCC for Windows) cross-compiler
        sudo apt-get install -y mingw-w64 
        
        # Download or install pre-compiled MinGW Allegro 5 binaries here if needed
        # (Often managed via a lib folder in your repo or downloaded via wget)

    - name: Compile Windows EXE using Linux GCC
      run: |
        # 1. Linux GCC naturally understands <bits/stdc++.h>
        # 2. MinGW provides the Windows headers (<windows.h>, <mmsystem.h>)
        # 3. Target x86_64-w64-mingw32-g++ compiles directly to a Windows .exe
        
        x86_64-w64-mingw32-g++ -std=c++17 *.cpp -o FantasyGame.exe \
          -I./include \
          -L./lib \
          -lallegro-5.0.10-monolith-mt \
          -lwinmm -lgdi32 -lcomdlg32 -lole32

    - name: Zip and Bundle Assets
      run: |
        # Clean, fast Linux bash tools instead of PowerShell
        mkdir dist
        cp FantasyGame.exe dist/
        cp *.png dist/ 2>/dev/null || true
        cp *.wav dist/ 2>/dev/null || true
        cp *.ttf dist/ 2>/dev/null || true
        
        zip -r FantasyGame-Windows-Build.zip dist/

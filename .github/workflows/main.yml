name: C++ CI/CD with Allegro 5 (Windows Native Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download & Extract Windows Allegro 5 Development Files
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://github.com/liballeg/allegro5/releases/download/5.2.8.0/allegro-x86_64-w64-mingw32-gcc-12.1.0-posix-seh-static-5.2.8.0.zip" -OutFile "allegro.zip"
        Expand-Archive -Path "allegro.zip" -DestinationPath "allegro_win"

    - name: Compile Game for Windows (.exe)
      shell: cmd
      run: |
        set PATH=C:\msys64\mingw64\bin;%PATH%
        g++ -std=c++17 *.cpp -o FantasyGame.exe ^
          -include windows.h ^
          -include mmsystem.h ^
          -I.\allegro_win\allegro\include ^
          -L.\allegro_win\allegro\lib ^
          -lallegro-monolith.dll ^
          -static-libgcc -static-libstdc++ ^
          -lwinmm

    # === CONTINUOUS DELIVERY (CD) COMPONENT ===
    - name: Upload Windows Game Bundle
      uses: actions/upload-artifact@v4
      with:
        name: FantasyGame-Windows-Build
        path: |
          FantasyGame.exe
          allegro_monolith-5.2.dll
          *.ttf
          *.png
          *.wav

name: C++ CI/CD (Linux Cross-Compile to Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Linux Build Tools & Cross-Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential mingw-w64 wget unzip

    - name: Download & Extract Windows Allegro 5 Libraries
      run: |
        # Download the official pre-compiled Allegro 5 binaries for Windows MinGW
        wget https://github.com/liballeg/allegro5/releases/download/5.2.8.0/allegro-x86_64-w64-mingw32-gcc-12.1.0-posix-seh-static-5.2.8.0.zip -O allegro.zip
        unzip allegro.zip -d allegro_win/

    - name: Compile Game to Windows .exe
      run: |
        # We use '-include windows.h' and '-include mmsystem.h' to force-inject the Windows audio definitions 
        # We also keep '-lwinmm' at the end to properly link the library
        x86_64-w64-mingw32-g++ -std=c++17 *.cpp -o FantasyGame.exe \
          -include windows.h \
          -include mmsystem.h \
          -I./allegro_win/allegro/include \
          -L./allegro_win/allegro/lib \
          -lallegro-monolith.dll \
          -static-libgcc -static-libstdc++ \
          -lwinmm

    # === CONTINUOUS DELIVERY (CD) STEP ===
    - name: Upload Windows Game Bundle
      uses: actions/upload-artifact@v4
      with:
        name: FantasyGame-Windows-Build
        path: |
          FantasyGame.exe
          allegro_monolith-5.2.dll
          *.ttf
          *.png
          *.wav
          FantasyGame.exe
          allegro_monolith-5.2.dll
          *.ttf
          *.png
          *.wav

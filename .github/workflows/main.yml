name: C++ CI with Allegro 5

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies and Allegro 5
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake liballegro5-dev

    - name: Compile Game (All CPP Files with Addons)
      run: |
        g++ -std=c++17 *.cpp -o FantasyGame \
          -lallegro \
          -lallegro_main \
          -lallegro_image \
          -lallegro_audio \
          -lallegro_acodec \
          -lallegro_font \
          -lallegro_ttf \
          -lallegro_primitives \
          -lallegro_dialog

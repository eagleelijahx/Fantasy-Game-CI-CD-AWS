name: C++ CI with Allegro 5
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. Caching Step ---
    - name: Restore vcpkg artifacts from cache
      uses: actions/cache@v4
      with:
        path: |
          C:/vcpkg/downloads
          C:/vcpkg/installed
          ~/.vcpkg
        key: ${{ runner.os }}-vcpkg-static-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-static-

    # --- 2. Install Step (Static) ---
    - name: Install Allegro 5 via vcpkg
      run: |
        vcpkg install allegro5:x64-windows-static

    # --- 3. Setup MSVC Compiler Path ---
    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    # --- 4. Compile Step (Static + GCC Header Fix) ---
    - name: Compile Game for Windows (.exe)
      run: |
        # Create a fake bits folder to trick MSVC into finding stdc++.h
        mkdir bits -ErrorAction SilentlyContinue
        
        # Inject the proxy headers safely using a simple PowerShell string block
        $headers = @'
        #include <iostream>
        #include <vector>
        #include <string>
        #include <algorithm>
        #include <cmath>
        #include <memory>
        #include <map>
        #include <set>
        #include <queue>
        #include <stack>
        #include <fstream>
        #include <sstream>
        '@
        $headers | Out-File -FilePath bits\stdc++.h -Encoding utf8

        # Compile with /EHsc exception support and look inside current directory (.) for headers
        cl.exe /std:c++17 /MT /EHsc *.cpp /Fe:FantasyGame.exe `
          /I. `
          /I"C:\vcpkg\installed\x64-windows-static\include" `
          /link /LIBPATH:"C:\vcpkg\installed\x64-windows-static\lib" `
          allegro-static.lib allegro_main-static.lib allegro_image-static.lib `
          allegro_audio-static.lib allegro_acodec-static.lib allegro_font-static.lib `
          allegro_ttf-static.lib allegro_primitives-static.lib allegro_dialog-static.lib `
          user32.lib gdi32.lib opengl32.lib winmm.lib shlwapi.lib psapi.lib shell32.lib `
          advapi.lib ole32.lib uuid.lib

    # --- 5. Clean Single-File Upload (Fallback) ---
    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FantasyGame-Standalone-Build
        path: FantasyGame.exe

    # --- 6. Direct Exe Release Publisher ---
    - name: Publish Direct Exe Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Build v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
        files: FantasyGame.exe

name: Post Release Link

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  post-link:
    runs-on: ubuntu-latest
    steps:
      - name: Post Download Link to Release
        env:
          # This gets the tag name (e.g., v1.0.26) from the release
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Construct the URL based on your specific format
          # Note: Adjust the filename pattern if your ZIP name differs from the tag
          DOWNLOAD_URL="https://dcbc64a200c5t.cloudfront.net/FantasyGame-$RELEASE_TAG.zip"
          
          # Use GitHub CLI to post a comment/body update to the release
          gh release edit "$RELEASE_TAG" --append-body \
          -n "
          
          ---
          ### 📥 Download the Game
          [Download $RELEASE_TAG here]($DOWNLOAD_URL)"
